<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>管理者ログイン</title>
<link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container mt-4" style="max-width: 480px;">

  <h1 class="mb-4 text-center">管理者ログイン</h1>

  <form th:action="@{/admins/adminslogin}" th:object="${admin}" method="post">

    <!-- ログイン失敗メッセージ -->
    <div class="alert alert-danger"
         th:if="${#fields.hasErrors('loginId')}"
         th:errors="*{loginId}">
    </div>

    <div class="mb-3">
      <label class="form-label" for="loginId">ログインID</label>
      <input type="text" id="loginId" class="form-control" th:field="*{loginId}">
      <div class="text-danger small"
           th:if="${#fields.hasErrors('loginId')}"
           th:errors="*{loginId}">
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label" for="loginPass">パスワード</label>
      <input type="password" id="loginPass" class="form-control" th:field="*{loginPass}">
      <div class="text-danger small"
           th:if="${#fields.hasErrors('loginPass')}"
           th:errors="*{loginPass}">
      </div>
    </div>

    <button class="btn btn-primary w-100" type="submit">
      ログイン
    </button>

  </form>

</div>

</body>
</html>
